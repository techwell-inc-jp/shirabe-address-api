name = "shirabe-address-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Workers ルート(実装指示書 §5.1: 別Worker + ルート振り分け方式、A案確定 2026-04-22)
# shirabe.dev/api/v1/address/* を住所 API Worker が捌く。
# 暦 API(shirabe-calendar-api)は shirabe.dev apex を custom_domain で受けており、
# 具体的なパスパターンは本ルートが優先される(Cloudflare Workers Route 優先度仕様)。
#
# api.shirabe.dev 側も同等にルーティングする場合は、経営者側で
# Cloudflare Dashboard にて手動追加するか、本セクションに追記する。
[[routes]]
pattern = "shirabe.dev/api/v1/address/*"
zone_name = "shirabe.dev"

# B-1 SEO 静的ページ(/docs/address-normalize, /docs/address-batch, /docs/address-pricing)。
# 暦 API の `/docs/rokuyo-api` / `/docs/rekichu-api` とはパスが重ならないため、
# Cloudflare Workers Route の specificity 優先ルールで共存可能。
[[routes]]
pattern = "shirabe.dev/docs/address-*"
zone_name = "shirabe.dev"

[vars]
API_VERSION = "0.1.0-phase1"

# Stripe Price ID(経営者が 2026-04-21 に Stripe ダッシュボードで作成)
# Meter: address_api_requests(mtr_61UXv0btCvll6mOOV41DV2wkNs8tV9Ro)
STRIPE_PRICE_STARTER = "price_1TOWyODV2wkNs8tVqNfkV7Pn"
STRIPE_PRICE_PRO = "price_1TOWz8DV2wkNs8tVAWNsBJFE"
STRIPE_PRICE_ENTERPRISE = "price_1TOX03DV2wkNs8tVC6bZ3TIO"

# STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET は `wrangler secret put` で注入

# Fly.io 側エンドポイント URL(実装指示書 §3.3)
FLYIO_GEOCODE_URL = "https://shirabe-address-api.fly.dev/internal/geocode"

# YAMLファイルをテキストモジュールとしてバンドルに取り込む
# (GET /openapi.yaml で docs/openapi.yaml の内容を返すため)
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true

# API_KEYS: **暦 API と共有**確定(経営者判断 2026-04-22)。
# 1キー集約構造(docs/kv-api-keys-design.md)で暦・住所の plan を同一レコードに集約し、
# 同一 APIキーで両 API にアクセス可能にする。
# 参照: 暦 API 側 wrangler.toml(../shirabe-calendar/wrangler.toml)の同 namespace。
[[kv_namespaces]]
binding = "API_KEYS"
id = "3b6bfff407974b7cbf79ded8e184c1a6"
preview_id = "3b6bfff407974b7cbf79ded8e184c1a6"

# === 住所 API 専用 namespace(2026-04-22 新規作成済) ===
# 以下 3 件は住所 API 固有で、暦 API とは共有しない。
# 作成コマンド(実行済):
#   npx wrangler kv namespace create RATE_LIMITS_ADDRESS → 46538dc13de247fea9eec7fa85158357
#   npx wrangler kv namespace create USAGE_LOGS_ADDRESS  → b032e3d10b374fbcb0fb98b70b035d8e
#   npx wrangler kv namespace create ADDRESS_CACHE       → 3c97f63c0598436fba5415a4af57c3ef

# レート制限カウンター(住所 API 専用)
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "46538dc13de247fea9eec7fa85158357"
preview_id = "46538dc13de247fea9eec7fa85158357"

# 利用量ログ(住所 API 専用)
[[kv_namespaces]]
binding = "USAGE_LOGS"
id = "b032e3d10b374fbcb0fb98b70b035d8e"
preview_id = "b032e3d10b374fbcb0fb98b70b035d8e"

# 住所キャッシュ(新規、TTL: 3600秒、実装指示書 §3.4)
[[kv_namespaces]]
binding = "ADDRESS_CACHE"
id = "3c97f63c0598436fba5415a4af57c3ef"
preview_id = "3c97f63c0598436fba5415a4af57c3ef"

# 住所 API 用 Analytics Engine Dataset(暦 API とは別 Dataset)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "shirabe_address_events"

# 本番環境の Secret は `wrangler secret put` で設定(実装指示書 §8.1):
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET (住所 API 用、新規)
# - FLY_INTERNAL_TOKEN    (Workers → Fly.io 認証用共有シークレット)
# - CF_ACCOUNT_ID         (AE 書込)
# - CF_AE_READ_TOKEN      (AE 読取、内部統計用)
# - INTERNAL_STATS_USER   (内部統計 Basic 認証)
# - INTERNAL_STATS_PASS   (内部統計 Basic 認証)
